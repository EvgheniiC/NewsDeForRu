name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend (ruff, mypy, pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: news
          POSTGRES_PASSWORD: news
          POSTGRES_DB: newsdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U news -d newsdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Ruff
        run: cd backend && ruff check app tests

      - name: Mypy
        run: cd backend && mypy app

      - name: Pytest
        env:
          MIGRATION_TEST_ADMIN_URL: postgresql+psycopg://news:news@127.0.0.1:5432/postgres
        run: cd backend && pytest

  frontend:
    name: Frontend (lint, build, e2e)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Unit tests (Vitest)
        run: npm run test
        working-directory: frontend

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: E2E
        run: npm run test:e2e
        working-directory: frontend
